<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Product Management - MyPetStore Admin</title>
    <link rel="stylesheet" th:href="@{/css/admin.css}" type="text/css" media="screen"/>
</head>
<body>

<header th:replace="~{admin/common/top}"></header>

<div class="admin-container">
    <h2 class="section-title">
        <span th:text="${categoryName}">Category Name</span> - Product Management
        <a th:href="@{/catalog/categories}" class="btn btn-primary">Back to Categories</a>
    </h2>
    <!-- Search Form -->
    <div class="admin-search">
        <form th:action="@{/catalog/products}" method="get" class="search-form-inline">
            <input type="hidden" name="categoryId" th:value="${categoryId}"/>
            <input type="text"
                   name="keyword"
                   th:value="${keyword}"
                   placeholder="Search by product ID, name, or description..."
                   class="search-input"/>
            <button type="submit" class="btn btn-primary">Search</button>
            <a th:href="@{/catalog/products(categoryId=${categoryId})}" class="btn btn-success">Clear</a>
        </form>
    </div>

    <div class="category-grid">
        <div th:each="product : ${products}" class="category-card">
            <div class="category-card-header">
                <span class="category-id" th:text="${product.productId}"></span>
            </div>
            <h3 class="category-name" th:text="${product.name}"></h3>
            <p class="category-description" th:text="${product.description != null and product.description.startsWith('<') ? product.description.split('>')[1] : product.description}"></p>
            <div class="category-actions">
                <a th:href="@{/catalog/items(productId=${product.productId})}" class="btn btn-primary btn-sm">Items</a>
                <a th:href="@{/catalog/products(categoryId=${param.categoryId}, editProductId=${product.productId})}"
                   class="btn btn-warning btn-sm">View/Edit</a>
                <form th:action="@{/catalog/products/delete}" method="post" style="display: inline;"
                      onsubmit="return confirm('Are you sure you want to delete this product?')">
                    <input type="hidden" name="productId" th:value="${product.productId}"/>
                    <input type="hidden" name="categoryId" th:value="${param.categoryId}"/>
                    <button type="submit" class="btn btn-danger btn-sm">Delete</button>
                </form>
            </div>
        </div>

        <!-- Empty state when no products -->
        <div th:if="${#lists.isEmpty(products)}" class="empty-state">
            <div class="empty-state-icon">📦</div>
            <p th:text="${keyword != null and !keyword.isEmpty() ? 'No products found matching your search.' : 'No products found in this category. Add your first product to get started.'}"></p>
        </div>
    </div>

    <!-- Add/Edit Product Card - Full Width -->
    <div id="edit-form" class="category-card" style="border-left-color: #27ae60; margin-top: 2rem;">
        <div class="category-card-header">
            <h3 class="category-name" th:text="${editProduct != null ? 'Edit Product' : 'Add New Product'}">Add New
                Product</h3>
        </div>

        <!-- Edit Product Form -->
        <form th:action="@{/catalog/products/update}" th:if="${editProduct != null}" method="post">
            <input type="hidden" name="categoryId" th:value="${categoryId}"/>
            <input type="hidden" name="productId" th:value="${editProduct.productId}"/>
            <div class="form-row">
                <div class="form-group">
                    <label for="editProductId">Product ID</label>
                    <input type="text" id="editProductId" readonly
                           th:value="${editProduct.productId}"
                           required
                           placeholder="e.g., FI-SW-01"/>
                </div>
                <div class="form-group">
                    <label for="editName">Product Name</label>
                    <input type="text" id="editName" name="name"
                           th:value="${editProduct.name}"
                           required
                           placeholder="e.g., Angelfish"/>
                </div>
            </div>
            <div class="form-group">
                <label for="editDescription">Description</label>
                <textarea id="editDescription" name="description" rows="3"
                          th:text="${editProduct.description}"
                          placeholder="Enter product description"></textarea>
            </div>
            <div class="category-actions">
                <button type="submit" class="btn btn-success">Update Product</button>
                <a th:href="@{/catalog/products(categoryId=${categoryId})}" class="btn btn-warning">Cancel Edit</a>
            </div>
        </form>

        <!-- Add New Product Form -->
        <form th:action="@{/catalog/products/add}" th:if="${editProduct == null}" method="post">
            <input type="hidden" name="categoryId" th:value="${param.categoryId}"/>
            <div class="form-row">
                <div class="form-group">
                    <label for="productId">Product ID</label>
                    <input type="text" id="productId" name="productId" required placeholder="e.g., FI-SW-01"/>
                </div>
                <div class="form-group">
                    <label for="name">Product Name</label>
                    <input type="text" id="name" name="name" required placeholder="e.g., Angelfish"/>
                </div>
            </div>
            <div class="form-group">
                <label for="description">Description</label>
                <textarea id="description" name="description" rows="3"
                          placeholder="Enter product description"></textarea>
            </div>
            <div class="category-actions">
                <button type="submit" class="btn btn-success">Add Product</button>
                <button type="reset" class="btn btn-warning">Clear</button>
            </div>
        </form>
    </div>
</div>

<script th:inline="javascript">
    // Auto scroll to edit form when in edit mode
    /*<![CDATA[*/
    var editProduct = /*[[${editProduct}]]*/ null;
    if (editProduct != null) {
        window.addEventListener('load', function () {
            var editForm = document.getElementById('edit-form');
            if (editForm) {
                editForm.scrollIntoView({block: 'end'});
            }
        });
    }
    /*]]>*/
</script>

</body>
</html>
