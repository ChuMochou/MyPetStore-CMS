<!DOCTYPE html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>管理员注册 - MyPetStore</title>
    <link rel="stylesheet" th:href="@{/css/admin.css}">
</head>
<body>
    <div class="login-wrapper">
        <div class="login-container">
            <div class="login-header">
                <div class="login-logo">🐾</div>
                <h1 class="login-title">MyPetStore</h1>
                <p class="login-subtitle">管理员账号注册</p>
            </div>

            <form class="login-form" id="registerForm" th:action="@{/account/newAccount}" method="post">
                <div class="form-group">
                    <label for="username">用户名</label>
                    <input type="text" id="username" name="username" required 
                           placeholder="请输入用户名（4-10个字符）" 
                           autocomplete="username"
                           minlength="4" maxlength="10">
                </div>

                <div class="form-group">
                    <label for="password">密码</label>
                    <input type="password" id="password" name="password" required 
                           placeholder="请输入密码（4-10个字符）" 
                           autocomplete="new-password"
                           minlength="4" maxlength="10">
                </div>

                <div class="form-group">
                    <label for="repeatedPassword">确认密码</label>
                    <input type="password" id="repeatedPassword" name="repeatedPassword" required 
                           placeholder="请再次输入密码" 
                           autocomplete="new-password"
                           minlength="4" maxlength="10">
                </div>

                <button type="submit" class="btn-login">注 册</button>

                <div th:if="${newAccountMsg}" class="login-error" th:text="${newAccountMsg}"></div>

                <div class="login-footer">
                    <p>已有账号？<a th:href="@{/account/signOnForm}" class="login-link">立即登录</a></p>
                </div>
            </form>
        </div>
    </div>
</body>
</html>
